name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "typeset-updater.key"
          $utf8 = New-Object System.Text.UTF8Encoding $false

          function Save-UpdaterKey([string]$secretValue) {
            $candidate = $secretValue.Trim()

            foreach ($attempt in 1..2) {
              try {
                $bytes = [System.Convert]::FromBase64String($candidate)
                $text = $utf8.GetString($bytes)
                $firstLine = ($text -split "`r?`n")[0]

                if ($firstLine -like "untrusted comment:*") {
                  [System.IO.File]::WriteAllBytes($keyPath, $bytes)
                  return
                }

                $candidate = $text.Trim()
              } catch {
                break
              }
            }

            $firstRawLine = ($secretValue -split "`r?`n")[0]
            if ($firstRawLine -like "untrusted comment:*") {
              [System.IO.File]::WriteAllText($keyPath, $secretValue, $utf8)
              return
            }

            throw "Updater private key secret is invalid. It must be the private key generated by 'npx tauri signer generate', not the public key."
          }

          if (-not [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_B64)) {
            Save-UpdaterKey $env:TAURI_SIGNING_PRIVATE_KEY_B64
          } elseif (-not [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Save-UpdaterKey $env:TAURI_SIGNING_PRIVATE_KEY
          } else {
            throw "Missing updater signing key. Set TAURI_SIGNING_PRIVATE_KEY_B64 from the private key file generated by 'npx tauri signer generate'."
          }

          $firstLine = Get-Content -LiteralPath $keyPath -First 1
          if ($firstLine -notlike "untrusted comment:*") {
            throw "Updater private key secret is invalid. It must be the private key file, not the public key. Recommended: set TAURI_SIGNING_PRIVATE_KEY_B64 to the base64 of the private key file."
          }

          "TAURI_SIGNING_PRIVATE_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $encodedKey = [System.Convert]::ToBase64String([System.IO.File]::ReadAllBytes($keyPath))
          "TAURI_SIGNING_PRIVATE_KEY=$encodedKey" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Typeset ${{ github.ref_name }}
          releaseBody: See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis,msi
          updaterJsonPreferNsis: true
